name: Sync YouTrack Issues to GitHub

# Wakes up every 4 hours automatically strictly from the main branch
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Sync YouTrack to GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          YT_BASE: ${{ secrets.YOUTRACK_BASE_URL }}
          YT_TOKEN: ${{ secrets.YOUTRACK_TOKEN }}
          YT_BASE_VAR: ${{ vars.YOUTRACK_BASE_URL }}
          YT_TOKEN_VAR: ${{ vars.YOUTRACK_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json
          import os
          import sys
          import urllib.request
          import urllib.parse
          import urllib.error

          # Username Bridge: YouTrack login/name -> GitHub collaborator username (NO EMAILS)
          YT_TO_GH_USER = {
              "admin": "geterktt",
              "geterktt": "geterktt",
              "YusufSemihCan": "YusufSemihCan",
              "Yusuf Semih Can": "YusufSemihCan"
          }

          YOUTRACK_BASE_URL = (os.environ.get("YT_BASE") or os.environ.get("YT_BASE_VAR") or "").rstrip('/')
          YOUTRACK_TOKEN = os.environ.get("YT_TOKEN") or os.environ.get("YT_TOKEN_VAR") or ""
          GITHUB_REPO = os.environ.get("GITHUB_REPO", "")
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")

          if not YOUTRACK_BASE_URL or not YOUTRACK_TOKEN:
              print("\n[!] DIAGNOSTIC FAILURE: Empty YouTrack secrets.")
              sys.exit(1)

          def make_request(url, headers, method="GET", data=None):
              req = urllib.request.Request(url, headers=headers, method=method)
              if data is not None:
                  req.data = json.dumps(data).encode('utf-8')
                  req.add_header('Content-Type', 'application/json')
              try:
                  with urllib.request.urlopen(req) as response:
                      if response.status == 204:
                          return None
                      return json.loads(response.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  err = e.read().decode('utf-8', errors='ignore')
                  print(f"[-] HTTP {e.code} Error for {url}:\n{err}")
                  return None

          print(f"\n[*] Fetching ALL YouTrack issues for project 'PHY'...")
          query = urllib.parse.quote("project: PHY")
          fields = "idReadable,summary,description,resolved,comments(author(name),text),customFields(name,value(name,login,presentation))"
          url = f"{YOUTRACK_BASE_URL}/api/issues?query={query}&fields={fields}"
          yt_headers = {"Authorization": f"Bearer {YOUTRACK_TOKEN}", "Accept": "application/json"}
          
          yt_issues = make_request(url, yt_headers)
          if yt_issues is None:
              print("[-] Failed to query YouTrack REST API.")
              sys.exit(1)

          active_yt_ids = set()
          print(f"[*] Found {len(yt_issues)} YouTrack issue(s).")

          gh_url = f"https://api.github.com/repos/{GITHUB_REPO}/issues?state=all&per_page=100"
          gh_headers = {"Authorization": f"token {GITHUB_TOKEN}", "Accept": "application/vnd.github.v3+json"}
          gh_issues = make_request(gh_url, gh_headers) or []
          
          existing_issues_map = {}
          for item in gh_issues:
              title = item.get("title", "")
              number = item.get("number")
              if title.startswith("[") and "]" in title and number:
                  yt_id_match = title[1:title.index("]")]
                  existing_issues_map[yt_id_match] = number

          count = 0
          for issue in yt_issues:
              yt_id = issue.get("idReadable")
              if not yt_id:
                  continue
              active_yt_ids.add(yt_id)
              summary = issue.get("summary", "No Summary")
              desc = issue.get("description", "")
              is_resolved = bool(issue.get("resolved"))
              comments = issue.get("comments", [])
              
              assignee_login = None
              assignee_name = "Unassigned"
              priority = "Normal"
              issue_type = "Task"
              state = "Resolved" if is_resolved else "In Progress"
              sprints = []
              estimation_str = "None"
              spent_time_str = "0m"

              for field in issue.get("customFields", []):
                  fname = field.get("name")
                  fval = field.get("value")
                  if not fval:
                      continue
                  if fname == "Assignee":
                      assignee_name = fval.get("name", "Unknown")
                      assignee_login = fval.get("login")
                  elif fname == "Priority":
                      priority = fval.get("name", "Normal")
                  elif fname == "Type":
                      issue_type = fval.get("name", "Task")
                  elif fname == "State":
                      state = fval.get("name", state)
                  elif fname == "Sprints":
                      if isinstance(fval, list):
                          sprints = [s.get("name") for s in fval if s.get("name")]
                      elif isinstance(fval, dict):
                          sprints = [fval.get("name")]
                  elif fname == "Estimation":
                      estimation_str = fval.get("presentation", "None")
                  elif fname == "Spent time":
                      spent_time_str = fval.get("presentation", "0m")

              sprint_str = ", ".join(sprints) if sprints else "None"
              
              # Map YouTrack username to GitHub account (NO EMAILS)
              target_gh_assignee = YT_TO_GH_USER.get(assignee_login) or YT_TO_GH_USER.get(assignee_name) or assignee_login

              assignee_display = assignee_name
              if target_gh_assignee and target_gh_assignee != assignee_name:
                  assignee_display = f"{assignee_name} (@{target_gh_assignee})"
              elif target_gh_assignee:
                  assignee_display = f"@{target_gh_assignee}"

              header_box = (
                  f"> **YouTrack Ticket Metadata:**\n"
                  f"> * **Status:** `{state}` | **Type:** `{issue_type}` | **Priority:** `{priority}`\n"
                  f"> * **Assignee:** {assignee_display} | **Sprint:** `{sprint_str}`\n"
                  f"> * **Time Spent:** `{spent_time_str}` *(Est. `{estimation_str}`)*\n\n"
              )

              body_parts = [header_box, desc or "*(No description provided)*"]
              
              if comments:
                  body_parts.append("\n\n---\n### Discussion Comments:")
                  for c in comments:
                      c_author = (c.get("author") or {}).get("name", "Unknown User")
                      c_text = c.get("text", "")
                      if c_text:
                          body_parts.append(f"\n**{c_author}:**\n> {c_text}\n")
                          
              body_parts.append(f"\n\n---\n*Synced automatically from YouTrack: [{yt_id}]*")
              full_body = "".join(body_parts)
              
              target_gh_state = "closed" if is_resolved else "open"
              payload = {"title": f"[{yt_id}] {summary}", "body": full_body, "state": target_gh_state}
              if target_gh_assignee:
                  payload["assignees"] = [target_gh_assignee]

              target_url = ""
              method = "POST"
              if yt_id in existing_issues_map:
                  gh_num = existing_issues_map[yt_id]
                  print(f"[*] Syncing #{gh_num} ({yt_id}) -> time={spent_time_str}/{estimation_str}...")
                  target_url = f"https://api.github.com/repos/{GITHUB_REPO}/issues/{gh_num}"
                  method = "PATCH"
              else:
                  print(f"[*] Creating new GitHub issue for {yt_id}...")
                  target_url = f"https://api.github.com/repos/{GITHUB_REPO}/issues"

              res = make_request(target_url, gh_headers, method=method, data=payload)
              
              if res is None and "assignees" in payload:
                  del payload["assignees"]
                  res = make_request(target_url, gh_headers, method=method, data=payload)

              if res:
                  count += 1

          # Cleanup: Handle permanently deleted issues in YouTrack
          for old_id, gh_num in existing_issues_map.items():
              if old_id not in active_yt_ids:
                  print(f"[*] Flagging permanently deleted ticket #{gh_num} ({old_id})...")
                  del_url = f"https://api.github.com/repos/{GITHUB_REPO}/issues/{gh_num}"
                  del_payload = {
                      "state": "closed",
                      "title": f"[DELETED] {old_id}",
                      "body": "> **[!] This ticket was permanently removed/deleted upstream in YouTrack.**"
                  }
                  make_request(del_url, gh_headers, method="PATCH", data=del_payload)

          print(f"\n[*] Sync complete. Successfully processed {count} issue(s).")
          EOF
