name: Antigravity Unit Tests

# Triggers automatically on push or pull request to any branch, and allows manual execution.
on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyray

    - name: Run Simulation & Graphics Unit Tests
      run: |
        python -m unittest discover -s "Unit tests" -p "test_*.py"
