name: Sync YouTrack Issues to GitHub

on:
  push:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Sync YouTrack to GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          YT_BASE: ${{ secrets.YOUTRACK_BASE_URL }}
          YT_TOKEN: ${{ secrets.YOUTRACK_TOKEN }}
          YT_BASE_VAR: ${{ vars.YOUTRACK_BASE_URL }}
          YT_TOKEN_VAR: ${{ vars.YOUTRACK_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json
          import os
          import sys
          import urllib.request
          import urllib.parse
          import urllib.error

          print("[*] --- ENVIRONMENT VARIABLE INSPECTION ---")
          for k, v in sorted(os.environ.items()):
              if any(word in k for word in ["YT", "YOUTRACK", "BASE", "TOKEN", "GITHUB_REPO"]):
                  print(f"    Key: '{k}' | IsEmpty: {not bool(v)} | Length: {len(v)}")
          print("[*] ---------------------------------------")

          YOUTRACK_BASE_URL = (os.environ.get("YT_BASE") or os.environ.get("YT_BASE_VAR") or "").rstrip('/')
          YOUTRACK_TOKEN = os.environ.get("YT_TOKEN") or os.environ.get("YT_TOKEN_VAR") or ""
          GITHUB_REPO = os.environ.get("GITHUB_REPO", "")
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")

          if not YOUTRACK_BASE_URL or not YOUTRACK_TOKEN:
              print("\n[!] DIAGNOSTIC FAILURE: GitHub is passing empty strings for YT_BASE and YT_TOKEN.")
              print("    This confirms the secrets are not being injected by GitHub Actions.")
              print("\n    Please verify in GitHub -> Settings -> Secrets and variables -> Actions:")
              print("    1. In the 'Name' box, did you type EXACTLY: YOUTRACK_BASE_URL (no spaces, no colons)")
              print("    2. In the 'Secret' box, did you type EXACTLY: https://physicssim.youtrack.cloud")
              print("    3. In the second secret 'Name' box: YOUTRACK_TOKEN")
              print("    4. In the second 'Secret' box: perm-WXVzdWZ...")
              sys.exit(1)

          def make_request(url, headers, method="GET", data=None):
              req = urllib.request.Request(url, headers=headers, method=method)
              if data is not None:
                  req.data = json.dumps(data).encode('utf-8')
                  req.add_header('Content-Type', 'application/json')
              try:
                  with urllib.request.urlopen(req) as response:
                      if response.status == 204:
                          return None
                      return json.loads(response.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  err = e.read().decode('utf-8', errors='ignore')
                  print(f"[-] HTTP {e.code} Error for {url}:\n{err}")
                  return None

          print(f"\n[*] Querying YouTrack project 'PHY' at {YOUTRACK_BASE_URL}...")
          query = urllib.parse.quote("project: PHY #Unresolved")
          url = f"{YOUTRACK_BASE_URL}/api/issues?query={query}&fields=idReadable,summary,description"
          yt_headers = {"Authorization": f"Bearer {YOUTRACK_TOKEN}", "Accept": "application/json"}
          
          yt_issues = make_request(url, yt_headers)
          if yt_issues is None:
              print("[-] Failed to query YouTrack REST API. Please check token permissions.")
              sys.exit(1)

          print(f"[*] Found {len(yt_issues)} unresolved YouTrack issue(s).")
          if not yt_issues:
              sys.exit(0)

          gh_url = f"https://api.github.com/repos/{GITHUB_REPO}/issues?state=all&per_page=100"
          gh_headers = {"Authorization": f"token {GITHUB_TOKEN}", "Accept": "application/vnd.github.v3+json"}
          gh_issues = make_request(gh_url, gh_headers) or []
          
          existing_ids = set()
          for item in gh_issues:
              title = item.get("title", "")
              if title.startswith("[") and "]" in title:
                  existing_ids.add(title[1:title.index("]")])

          count = 0
          for issue in yt_issues:
              yt_id = issue.get("idReadable")
              if yt_id in existing_ids:
                  continue
              summary = issue.get("summary", "No Summary")
              desc = issue.get("description", "")
              print(f"[*] Importing {yt_id}: {summary}...")
              
              post_url = f"https://api.github.com/repos/{GITHUB_REPO}/issues"
              payload = {"title": f"[{yt_id}] {summary}", "body": f"{desc or ''}\n\n---\n*Synced from YouTrack: {yt_id}*"}
              res = make_request(post_url, gh_headers, method="POST", data=payload)
              if res and "html_url" in res:
                  print(f"[+] Created: {res['html_url']}")
                  count += 1
              else:
                  print(f"[-] Failed to import {yt_id}")

          print(f"\n[*] Sync complete. Successfully imported {count} issue(s).")
          EOF
